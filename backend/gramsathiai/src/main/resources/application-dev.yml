server:
   port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gramsathi

    username: ${UserName_DB}
    password: ${Password_DB}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:           # JPA and Hibernate configuration.
    hibernate:
      ddl-auto: update

    show-sql: true
    properties:
       hibernate:
         dialect: org.hibernate.dialect.MySQLDialect

logging:
      level:
         org.springframework.security: DEBUG